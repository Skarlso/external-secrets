version: 2
release:
  prerelease: auto # this should detect a release candidate and mark it as pre-release in GitHub

builds:
  - id: default
    binary: render
    flags:
      - -tags
      - netgo release
      - -trimpath
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64

archives:
  - id: default
    builds:
      - default
    name_template: "render_{{ .Os }}_{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}"
    format: tar.gz
      #binary_signs:
      #  - {}
sboms:
  - artifacts: archive
checksum:
  name_template: "render_checksums.txt"
